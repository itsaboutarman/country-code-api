version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assessment_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: assessment_redis
    ports:
      - "6379:6379"
    restart: always

  kafka:
      image: bitnami/kafka:latest
      container_name: assessment_kafka
      ports:
        - "9092:9092"
      environment:
        # Kraft basic settings
        - KAFKA_CFG_NODE_ID=1
        - KAFKA_CFG_PROCESS_ROLES=broker,controller
        - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@assessment_kafka:9093
        - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
        
        # Defining two different protocols: INTERNAL for docker, EXTERNAL for your Windows
        - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
        - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        
        # Explaining where each client should connect
        - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://assessment_kafka:29092,EXTERNAL://127.0.0.1:9092
        - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      restart: always

  minio:
    image: minio/minio
    container_name: assessment_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: super_secret_password
    command: server /data --console-address ":9001"
    restart: always

  kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      ports:
        - "7080:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        # Kafka-ui is inside docker, so it uses the INTERNAL port (29092)
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: assessment_kafka:29092
      depends_on:
        - kafka

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "7070:8081"
    depends_on:
      - redis

volumes:
  postgres_data: